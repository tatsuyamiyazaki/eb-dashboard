<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>経営実績レポート</title>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel (JSX変換用) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Marked (Markdown parser) & DOMPurify -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #ffffff; }

        /* チャットMarkdownスタイル */
        .chat-markdown h1, .chat-markdown h2, .chat-markdown h3, .chat-markdown h4 {
            font-weight: 700; margin-top: 0.75em; margin-bottom: 0.25em; line-height: 1.4;
        }
        .chat-markdown h1 { font-size: 1.1em; }
        .chat-markdown h2 { font-size: 1.05em; }
        .chat-markdown h3 { font-size: 1em; }
        .chat-markdown p { margin: 0.4em 0; }
        .chat-markdown ul, .chat-markdown ol { margin: 0.4em 0; padding-left: 1.4em; }
        .chat-markdown li { margin: 0.15em 0; }
        .chat-markdown ul li { list-style-type: disc; }
        .chat-markdown ol li { list-style-type: decimal; }
        .chat-markdown code {
            background-color: #e5e7eb; padding: 0.1em 0.35em; border-radius: 3px;
            font-size: 0.85em; font-family: 'Consolas', 'Monaco', monospace;
        }
        .chat-markdown pre {
            background-color: #1f2937; color: #e5e7eb; padding: 0.75em;
            border-radius: 6px; overflow-x: auto; margin: 0.5em 0; font-size: 0.85em;
        }
        .chat-markdown pre code {
            background-color: transparent; padding: 0; color: inherit;
        }
        .chat-markdown strong { font-weight: 700; }
        .chat-markdown em { font-style: italic; }
        .chat-markdown blockquote {
            border-left: 3px solid #d1d5db; padding-left: 0.75em;
            margin: 0.5em 0; color: #6b7280;
        }
        .chat-markdown hr { border: none; border-top: 1px solid #e5e7eb; margin: 0.75em 0; }
        .chat-markdown table { border-collapse: collapse; margin: 0.5em 0; width: 100%; font-size: 0.85em; }
        .chat-markdown th, .chat-markdown td { border: 1px solid #d1d5db; padding: 0.3em 0.6em; text-align: left; }
        .chat-markdown th { background-color: #f3f4f6; font-weight: 600; }

        /* 印刷設定 */
        @media print {
            .no-print { display: none !important; }
            body { background-color: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .page-break { break-inside: avoid; }
            canvas { max-height: 250px !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Marked設定
        if (typeof marked !== 'undefined') {
            marked.setOptions({ breaks: true, gfm: true });
        }
        const renderMarkdown = (text) => {
            if (typeof marked === 'undefined' || typeof DOMPurify === 'undefined') return text;
            const html = marked.parse(text);
            return DOMPurify.sanitize(html);
        };

        // --- アイコンコンポーネント ---
        const TrendingUp = ({ size }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>;
        const Printer = ({ size }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>;
        const ChevronDown = ({ size }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>;
        const CalendarIcon = ({ size }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
        const BarChartIcon = ({ size }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>;
        const ChatIcon = ({ size }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>;
        const SendIcon = ({ size }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>;
        const CloseIcon = ({ size }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const STRACIcon = ({ size }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="8" height="20" rx="1"/><rect x="10" y="2" width="12" height="9" rx="1"/><rect x="10" y="11" width="12" height="11" rx="1"/></svg>;

        // --- Chart Component Wrapper ---
        const ChartCanvas = ({ type, data, options }) => {
            const canvasRef = useRef(null);
            const chartRef = useRef(null);

            useEffect(() => {
                if (typeof window.Chart === 'undefined' || !canvasRef.current) return;
                if (chartRef.current) chartRef.current.destroy();

                const ctx = canvasRef.current.getContext('2d');
                chartRef.current = new window.Chart(ctx, { type, data, options });

                return () => { if (chartRef.current) chartRef.current.destroy(); };
            }, [data, options, type]);

            return <canvas ref={canvasRef} />;
        };

        // --- Main App Component ---
        const App = () => {
            const [rawData, setRawData] = useState([]);
            const [yearlyRawData, setYearlyRawData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            // フィルタ状態
            const [selectedDept, setSelectedDept] = useState("EB");
            const [selectedYear, setSelectedYear] = useState("2025");

            // ビューモード
            const [viewMode, setViewMode] = useState("monthly");

            // チャット状態
            const [chatOpen, setChatOpen] = useState(false);
            const [chatMessages, setChatMessages] = useState([]);
            const [chatInput, setChatInput] = useState("");
            const [chatLoading, setChatLoading] = useState(false);
            const chatEndRef = useRef(null);
            const chatRequestId = useRef(0);

            // リサイズ状態
            const [chatWidth, setChatWidth] = useState(380);
            const isResizing = useRef(false);

            useEffect(() => {
                const handleMouseMove = (e) => {
                    if (!isResizing.current) return;
                    const newWidth = window.innerWidth - e.clientX;
                    setChatWidth(Math.max(300, Math.min(700, newWidth)));
                };
                const handleMouseUp = () => {
                    isResizing.current = false;
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                };
                window.addEventListener('mousemove', handleMouseMove);
                window.addEventListener('mouseup', handleMouseUp);
                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('mouseup', handleMouseUp);
                };
            }, []);

            const startResize = () => {
                isResizing.current = true;
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
            };

            // GASからデータ取得
            useEffect(() => {
                setLoading(true);
                if (typeof google !== 'undefined' && google.script && google.script.run) {
                    let monthlyDone = false;
                    let yearlyDone = false;
                    let monthlyErr = null;

                    const checkDone = () => {
                        if (monthlyDone && yearlyDone) {
                            if (monthlyErr) setError(monthlyErr);
                            setLoading(false);
                        }
                    };

                    google.script.run
                        .withSuccessHandler((data) => {
                            if (!data || data.length === 0) {
                                monthlyErr = "データが見つかりませんでした。スプレッドシートを確認してください。";
                            } else {
                                setRawData(data);
                            }
                            monthlyDone = true;
                            checkDone();
                        })
                        .withFailureHandler((err) => {
                            console.error(err);
                            monthlyErr = "エラーが発生しました: " + err.message;
                            monthlyDone = true;
                            checkDone();
                        })
                        .getData();

                    google.script.run
                        .withSuccessHandler((data) => {
                            if (data && data.length > 0) {
                                setYearlyRawData(data);
                            }
                            yearlyDone = true;
                            checkDone();
                        })
                        .withFailureHandler((err) => {
                            console.error("年度集計データ取得エラー:", err);
                            yearlyDone = true;
                            checkDone();
                        })
                        .getYearlyData();
                } else {
                    setError("Google Apps Script環境外で実行されています。");
                    setLoading(false);
                }
            }, []);

            // 数値変換ユーティリティ
            const parseValue = (val) => {
                if (!val) return 0;
                if (typeof val === 'number') return val;
                const cleanVal = val.toString().replace(/[,\%￥\s]/g, '');
                const num = parseFloat(cleanVal);
                return isNaN(num) ? 0 : num;
            };

            const formatNumber = (num) => {
                if (num === null || num === undefined || isNaN(num)) return '-';
                return new Intl.NumberFormat('ja-JP').format(Math.round(num));
            };

            // フィルタリング処理（月次）
            const filteredData = useMemo(() => {
                if (!rawData.length) return [];

                return rawData.filter(row => {
                    if (!row['月度'] || !row['部署']) return false;

                    const dateStr = row['月度'];
                    const date = new Date(dateStr);
                    if (isNaN(date.getTime())) return false;

                    const rowYear = date.getFullYear();
                    const rowMonth = date.getMonth() + 1;

                    // 年度判定 (4月始まり)
                    const fiscalYear = rowMonth < 4 ? rowYear - 1 : rowYear;

                    if (fiscalYear.toString() !== selectedYear) return false;
                    if (row['部署'] !== selectedDept) return false;

                    // 2025年度の特別ルール: 2026年1月まで
                    if (selectedYear === '2025') {
                        if (rowYear === 2026 && rowMonth > 1) return false;
                    }

                    return true;
                });
            }, [rawData, selectedDept, selectedYear]);

            // 年度別フィルタリング（部署のみ）
            const filteredYearlyData = useMemo(() => {
                if (!yearlyRawData.length) return [];
                return yearlyRawData.filter(row => row['部署'] === selectedDept);
            }, [yearlyRawData, selectedDept]);

            // 年度計画データ（選択年度・部署に該当する行）
            const yearlyPlan = useMemo(() => {
                if (!yearlyRawData.length) return null;
                return yearlyRawData.find(row =>
                    row['部署'] === selectedDept &&
                    String(row['年度']).trim() === selectedYear
                ) || null;
            }, [yearlyRawData, selectedDept, selectedYear]);

            // KPI集計
            const kpi = useMemo(() => {
                const sum = (key) => filteredData.reduce((acc, cur) => acc + parseValue(cur[key]), 0);

                const totalSales = sum('売上');
                const planSales = sum('売上計画');
                const totalProfit = sum('限界利益');
                const planProfit = sum('限界利益計画');

                const count = filteredData.length || 1;
                const rate = (act, pln) => pln ? ((act / pln) * 100).toFixed(1) : 0;

                // 年度計画値（年度集計シートから取得）
                const yearPlanSales = yearlyPlan ? parseValue(yearlyPlan['売上計画']) : 0;
                const yearPlanProfit = yearlyPlan ? parseValue(yearlyPlan['限界利益計画']) : 0;
                const yearPlanHourly = yearlyPlan ? parseValue(yearlyPlan['時間当たり採算計画']) : 0;
                const yearPlanEmp = yearlyPlan ? parseValue(yearlyPlan['一人当たり限界利益計画']) : 0;

                return {
                    sales: { act: totalSales, pln: planSales, rate: rate(totalSales, planSales), yearPln: yearPlanSales, yearRate: rate(totalSales, yearPlanSales) },
                    profit: { act: totalProfit, pln: planProfit, rate: rate(totalProfit, planProfit), yearPln: yearPlanProfit, yearRate: rate(totalProfit, yearPlanProfit) },
                    hourly: { act: Math.round(sum('時間当たり採算') / count), pln: Math.round(sum('時間当たり採算計画') / count), rate: rate(Math.round(sum('時間当たり採算') / count), Math.round(sum('時間当たり採算計画') / count)), yearPln: yearPlanHourly, yearRate: rate(Math.round(sum('時間当たり採算') / count), yearPlanHourly) },
                    emp: { act: Math.round(sum('一人当たり限界利益') / count), pln: Math.round(sum('一人当たり限界利益計画') / count), rate: rate(Math.round(sum('一人当たり限界利益') / count), Math.round(sum('一人当たり限界利益計画') / count)), yearPln: yearPlanEmp, yearRate: rate(Math.round(sum('一人当たり限界利益') / count), yearPlanEmp) }
                };
            }, [filteredData, yearlyPlan]);

            // リスト抽出
            const { depts, years } = useMemo(() => {
                const d = new Set();
                const y = new Set();

                if (rawData.length === 0) {
                    y.add(2025);
                    d.add("EB");
                }

                rawData.forEach(row => {
                    if(row['部署']) d.add(row['部署']);
                    if(row['月度']) {
                        const date = new Date(row['月度']);
                        if (!isNaN(date.getTime())) {
                            const year = date.getMonth() < 3 ? date.getFullYear() - 1 : date.getFullYear();
                            y.add(year);
                        }
                    }
                });
                return {
                    depts: Array.from(d).sort(),
                    years: Array.from(y).sort((a,b) => b - a)
                };
            }, [rawData]);

            // 月次チャート設定
            const createChartConfig = (title, dataKeyActual, dataKeyPlan) => {
                const sortedData = [...filteredData].sort((a, b) => new Date(a['月度']) - new Date(b['月度']));

                const labels = sortedData.map(d => {
                    const date = new Date(d['月度']);
                    return `${date.getMonth() + 1}月`;
                });

                const actuals = sortedData.map(d => parseValue(d[dataKeyActual]));
                const plans = sortedData.map(d => parseValue(d[dataKeyPlan]));

                return {
                    type: 'line',
                    data: {
                        labels,
                        datasets: [
                            {
                                type: 'line',
                                label: '計画',
                                data: plans,
                                borderColor: '#2563eb',
                                backgroundColor: '#2563eb',
                                borderWidth: 2,
                                pointRadius: 3,
                                tension: 0.1,
                                fill: false,
                                yAxisID: 'y',
                                order: 1
                            },
                            {
                                type: 'line',
                                label: '実績',
                                data: actuals,
                                borderColor: '#dc2626',
                                backgroundColor: '#dc2626',
                                borderWidth: 2,
                                pointRadius: 3,
                                tension: 0.1,
                                fill: false,
                                yAxisID: 'y',
                                order: 0
                            }
                        ],
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: {
                                    usePointStyle: true,
                                    boxWidth: 8,
                                    font: { size: 11, family: "'Noto Sans JP', sans-serif" }
                                }
                            },
                            tooltip: {
                                backgroundColor: 'rgba(255, 255, 255, 0.9)',
                                titleColor: '#1f2937',
                                bodyColor: '#1f2937',
                                borderColor: '#e5e7eb',
                                borderWidth: 1,
                                padding: 10,
                                callbacks: {
                                    label: function(context) {
                                        let label = context.dataset.label || '';
                                        if (label) label += ': ';
                                        if (context.parsed.y !== null) label += new Intl.NumberFormat('ja-JP').format(context.parsed.y);
                                        return label;
                                    }
                                }
                            }
                        },
                        scales: {
                            x: {
                                grid: { display: false },
                                ticks: { font: { size: 10 }, color: '#4b5563' }
                            },
                            y: {
                                beginAtZero: true,
                                grid: { borderDash: [2, 2], color: '#f3f4f6' },
                                ticks: { font: { size: 10 }, color: '#9ca3af' }
                            }
                        }
                    }
                };
            };

            // 年度別チャート設定
            const createYearlyChartConfig = (title, dataKeyActual, dataKeyPlan) => {
                const sortedData = [...filteredYearlyData].sort((a, b) => {
                    const yA = parseValue(a['年度']);
                    const yB = parseValue(b['年度']);
                    return yA - yB;
                });

                const labels = sortedData.map(d => `${d['年度']}年度`);
                const actuals = sortedData.map(d => parseValue(d[dataKeyActual]));
                const plans = sortedData.map(d => parseValue(d[dataKeyPlan]));

                return {
                    type: 'line',
                    data: {
                        labels,
                        datasets: [
                            {
                                type: 'line',
                                label: '計画',
                                data: plans,
                                borderColor: '#2563eb',
                                backgroundColor: '#2563eb',
                                borderWidth: 2,
                                pointRadius: 4,
                                tension: 0.1,
                                fill: false,
                                yAxisID: 'y',
                                order: 1
                            },
                            {
                                type: 'line',
                                label: '実績',
                                data: actuals,
                                borderColor: '#dc2626',
                                backgroundColor: '#dc2626',
                                borderWidth: 2,
                                pointRadius: 4,
                                tension: 0.1,
                                fill: false,
                                yAxisID: 'y',
                                order: 0
                            }
                        ],
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: {
                                    usePointStyle: true,
                                    boxWidth: 8,
                                    font: { size: 11, family: "'Noto Sans JP', sans-serif" }
                                }
                            },
                            tooltip: {
                                backgroundColor: 'rgba(255, 255, 255, 0.9)',
                                titleColor: '#1f2937',
                                bodyColor: '#1f2937',
                                borderColor: '#e5e7eb',
                                borderWidth: 1,
                                padding: 10,
                                callbacks: {
                                    label: function(context) {
                                        let label = context.dataset.label || '';
                                        if (label) label += ': ';
                                        if (context.parsed.y !== null) label += new Intl.NumberFormat('ja-JP').format(context.parsed.y);
                                        return label;
                                    }
                                }
                            }
                        },
                        scales: {
                            x: {
                                grid: { display: false },
                                ticks: { font: { size: 10 }, color: '#4b5563' }
                            },
                            y: {
                                beginAtZero: true,
                                grid: { borderDash: [2, 2], color: '#f3f4f6' },
                                ticks: { font: { size: 10 }, color: '#9ca3af' }
                            }
                        }
                    }
                };
            };

            // チャットメッセージ追加時に自動スクロール
            useEffect(() => {
                if (chatEndRef.current) {
                    chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [chatMessages]);

            // フィルタ変更時はチャット履歴をリセット（データ前提が変わるため）
            useEffect(() => {
                chatRequestId.current++;
                setChatLoading(false);
                setChatMessages([]);
            }, [selectedDept, selectedYear, viewMode]);

            // 現在表示中のデータをコンテキストとして構築
            const buildDataContext = () => {
                if (viewMode === "monthly" || viewMode === "strac") {
                    const sorted = [...filteredData].sort((a, b) => new Date(a['月度']) - new Date(b['月度']));
                    const summary = `部署: ${selectedDept} / ${selectedYear}年度（月次データ）\n`;
                    const rows = sorted.map(row => {
                        return `${row['月度']} | 売上: ${row['売上']}(計画: ${row['売上計画']}) | 限界利益: ${row['限界利益']}(計画: ${row['限界利益計画']}) | 時間当たり採算: ${row['時間当たり採算']}(計画: ${row['時間当たり採算計画']}) | 一人当たり限界利益: ${row['一人当たり限界利益']}(計画: ${row['一人当たり限界利益計画']})`;
                    }).join('\n');
                    const yearPlanSummary = kpi.sales.yearPln > 0
                        ? `\n年度計画（${selectedYear}年度）:\n売上 年度計画: ${formatNumber(kpi.sales.yearPln)} / 進捗率: ${kpi.sales.yearRate}%\n限界利益 年度計画: ${formatNumber(kpi.profit.yearPln)} / 進捗率: ${kpi.profit.yearRate}%\n時間当たり採算 年度計画: ${formatNumber(kpi.hourly.yearPln)} / 進捗率: ${kpi.hourly.yearRate}%\n一人当たり限界利益 年度計画: ${formatNumber(kpi.emp.yearPln)} / 進捗率: ${kpi.emp.yearRate}%`
                        : '';
                    const kpiSummary = `\nKPI集計:\n売上 実績: ${formatNumber(kpi.sales.act)} / 計画: ${formatNumber(kpi.sales.pln)} / 達成率: ${kpi.sales.rate}%\n限界利益 実績: ${formatNumber(kpi.profit.act)} / 計画: ${formatNumber(kpi.profit.pln)} / 達成率: ${kpi.profit.rate}%\n時間当たり採算 実績: ${formatNumber(kpi.hourly.act)} / 計画: ${formatNumber(kpi.hourly.pln)} / 達成率: ${kpi.hourly.rate}%\n一人当たり限界利益 実績: ${formatNumber(kpi.emp.act)} / 計画: ${formatNumber(kpi.emp.pln)} / 達成率: ${kpi.emp.rate}%` + yearPlanSummary;
                    return summary + rows + kpiSummary;
                } else {
                    const sorted = [...filteredYearlyData].sort((a, b) => parseValue(a['年度']) - parseValue(b['年度']));
                    const summary = `部署: ${selectedDept}（年度別データ）\n`;
                    const rows = sorted.map(row => {
                        return `${row['年度']}年度 | 売上: ${row['売上']}(計画: ${row['売上計画']}) | 限界利益: ${row['限界利益']}(計画: ${row['限界利益計画']}) | 時間当たり採算: ${row['時間当たり採算']}(計画: ${row['時間当たり採算計画']}) | 一人当たり限界利益: ${row['一人当たり限界利益']}(計画: ${row['一人当たり限界利益計画']})`;
                    }).join('\n');
                    return summary + rows;
                }
            };

            // チャット送信
            const sendChat = () => {
                const msg = chatInput.trim();
                if (!msg || chatLoading) return;

                const userMsg = { role: 'user', text: msg };
                setChatMessages(prev => [...prev, userMsg]);
                setChatInput("");
                setChatLoading(true);

                const currentId = ++chatRequestId.current;
                const dataContext = buildDataContext();

                // 履歴を構築（送信前の chatMessages をそのまま使う）
                const MAX_TURNS = 6;
                const historyForServer = chatMessages
                    .filter(m => m && (m.role === 'user' || m.role === 'ai'))
                    .map(m => ({
                        role: m.role === 'ai' ? 'model' : 'user',
                        text: m.text
                    }))
                    .slice(-MAX_TURNS * 2);

                google.script.run
                    .withSuccessHandler((response) => {
                        if (chatRequestId.current !== currentId) return;
                        setChatMessages(prev => [...prev, { role: 'ai', text: response }]);
                        setChatLoading(false);
                    })
                    .withFailureHandler((err) => {
                        if (chatRequestId.current !== currentId) return;
                        setChatMessages(prev => [...prev, { role: 'ai', text: 'エラーが発生しました: ' + err.message }]);
                        setChatLoading(false);
                    })
                    .chatWithGemini(msg, dataContext, selectedDept, JSON.stringify(historyForServer));
            };

            // チャット中断
            const cancelChat = () => {
                chatRequestId.current++;
                setChatLoading(false);
                setChatMessages(prev => [...prev, { role: 'ai', text: '（回答を中断しました）' }]);
            };

            const handleChatKeyDown = (e) => {
                if (e.key === 'Enter' && e.ctrlKey) {
                    e.preventDefault();
                    sendChat();
                }
            };

            const ScoreCard = ({ title, mainValue, subValue, achievementRate, yearPlan, yearProgressRate }) => {
                const isPositive = achievementRate >= 100;
                const hasYearPlan = yearPlan > 0;
                return (
                    <div className="bg-white p-4 border border-gray-200 page-break">
                        <h3 className="text-xs font-bold text-gray-500 mb-2 uppercase tracking-wide">{title}</h3>
                        <div className="flex items-baseline gap-2 mb-1">
                            <span className="text-2xl font-bold text-gray-900">{formatNumber(mainValue)}</span>
                            <span className="text-xs text-gray-400">実績</span>
                        </div>
                        <div className="flex justify-between items-end border-t border-gray-100 pt-2 mt-2">
                            <div className="flex flex-col">
                                <span className="text-[10px] text-gray-400">計画</span>
                                <span className="text-sm font-medium text-gray-600">{formatNumber(subValue)}</span>
                            </div>
                            <div className={`text-right ${isPositive ? 'text-blue-700' : 'text-red-600'}`}>
                                <span className="text-sm font-bold">{achievementRate}%</span>
                                <span className="text-[10px] block text-gray-400">達成率</span>
                            </div>
                        </div>
                        {hasYearPlan && (
                            <div className="flex justify-between items-end border-t border-gray-100 pt-2 mt-2">
                                <div className="flex flex-col">
                                    <span className="text-[10px] text-gray-400">年度計画</span>
                                    <span className="text-sm font-medium text-gray-600">{formatNumber(yearPlan)}</span>
                                </div>
                                <div className={`text-right ${parseFloat(yearProgressRate) >= 100 ? 'text-blue-700' : 'text-amber-600'}`}>
                                    <span className="text-sm font-bold">{yearProgressRate}%</span>
                                    <span className="text-[10px] block text-gray-400">進捗率</span>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            // --- STRAC図コンポーネント ---
            const STRACDiagram = ({ sales, marginalProfit, fixedCost = 0, operatingProfit = 0, label, height = 280, compact = false }) => {
                if (!sales || sales <= 0) return (
                    <div className="flex items-center justify-center text-gray-400 text-sm" style={{height: height + 'px'}}>データなし</div>
                );

                const variableCost = sales - marginalProfit;
                const vcRatio = variableCost / sales * 100;
                const mpRatio = marginalProfit / sales * 100;

                const hasBreakdown = fixedCost > 0 || operatingProfit !== 0;
                const fcInMpRatio = marginalProfit > 0 ? (fixedCost / marginalProfit * 100) : 0;
                const opInMpRatio = marginalProfit > 0 ? (operatingProfit / marginalProfit * 100) : 0;
                const isOpNegative = operatingProfit < 0;

                // f/m値とランク
                const fmValue = marginalProfit > 0 ? (fixedCost / marginalProfit * 100) : null;
                const getFmRank = (fm) => {
                    if (fm === null) return { label: '-', color: 'text-gray-400', bg: 'bg-gray-100' };
                    if (fm <= 59) return { label: 'S', color: 'text-blue-700', bg: 'bg-blue-100' };
                    if (fm <= 79) return { label: 'A', color: 'text-green-700', bg: 'bg-green-100' };
                    if (fm <= 89) return { label: 'B', color: 'text-yellow-700', bg: 'bg-yellow-100' };
                    if (fm <= 99) return { label: 'C', color: 'text-orange-700', bg: 'bg-orange-100' };
                    if (fm <= 199) return { label: 'D', color: 'text-red-700', bg: 'bg-red-100' };
                    return { label: 'DD', color: 'text-red-800', bg: 'bg-red-200' };
                };
                const fmRank = getFmRank(fmValue);

                // 営業利益率
                const opRate = sales > 0 ? (operatingProfit / sales * 100).toFixed(1) : '-';
                // 固定費の対売上比
                const fcRate = sales > 0 ? (fixedCost / sales * 100).toFixed(1) : '-';

                // フォントサイズ統一
                const sz = compact ? 'text-xs' : 'text-xs';
                const szVal = compact ? 'text-xs' : 'text-xs';

                // ツールチップ
                const [tooltip, setTooltip] = React.useState(null);
                const wrapperRef = useRef(null);

                const showTooltip = (e, name, amount, rateLabel, rateValue, bgColor, textDark) => {
                    const rect = wrapperRef.current.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    setTooltip({ x, y, name, amount, rateLabel, rateValue, bgColor, textDark });
                };
                const hideTooltip = () => setTooltip(null);

                // ツールチップのテキスト色判定（明るい背景→黒、暗い背景→白）
                const tooltipText = tooltip?.textDark ? 'text-gray-800' : 'text-white';

                return (
                    <div ref={wrapperRef} className="relative">
                        {label && <p className={`font-bold text-gray-600 mb-2 text-center ${sz}`}>{label}</p>}
                        <div className="flex rounded overflow-hidden" style={{height: height + 'px'}}>
                            {/* 売上高 */}
                            <div className="flex flex-col items-center justify-center"
                                 onMouseMove={(e) => showTooltip(e, '売上高', formatNumber(sales), '対売上比', '100.0%', '#38b6ff', true)}
                                 onMouseLeave={hideTooltip}
                                 style={{width: '30%', backgroundColor: '#38b6ff', cursor: 'default'}}>
                                <span className={`font-bold text-gray-800 ${sz}`}>売上高</span>
                                <span className={`font-bold text-gray-800 ${szVal}`}>{formatNumber(sales)}</span>
                            </div>
                            {/* 右側 */}
                            <div className="flex flex-col" style={{width: '70%'}}>
                                {/* 変動費 */}
                                <div className="flex flex-col items-center justify-center"
                                     onMouseMove={(e) => showTooltip(e, '変動費', formatNumber(variableCost), '対売上比', vcRatio.toFixed(1) + '%', '#e2a9f1', true)}
                                     onMouseLeave={hideTooltip}
                                     style={{height: vcRatio + '%', backgroundColor: '#e2a9f1', minHeight: compact ? '36px' : '48px', cursor: 'default'}}>
                                    <span className={`font-bold text-gray-700 ${sz}`}>変動費</span>
                                    <span className={`font-bold text-gray-700 ${szVal}`}>{formatNumber(variableCost)}</span>
                                    <span className={`text-gray-600 ${szVal}`}>{vcRatio.toFixed(1)}%</span>
                                </div>
                                {/* 限界利益エリア */}
                                <div className="flex" style={{height: mpRatio + '%', minHeight: compact ? '56px' : '80px'}}>
                                    {/* 限界利益ラベル */}
                                    <div className="flex flex-col items-center justify-center"
                                         onMouseMove={(e) => showTooltip(e, '限界利益', formatNumber(marginalProfit), '対売上比', mpRatio.toFixed(1) + '%', '#c1ff72', true)}
                                         onMouseLeave={hideTooltip}
                                         style={{width: hasBreakdown ? '50%' : '100%', backgroundColor: '#c1ff72', cursor: 'default'}}>
                                        <span className={`font-bold text-gray-700 ${sz}`}>限界利益</span>
                                        <span className={`font-bold text-gray-700 ${szVal}`}>{formatNumber(marginalProfit)}</span>
                                        <span className={`text-gray-600 ${szVal}`}>{mpRatio.toFixed(1)}%</span>
                                    </div>
                                    {/* 固定費 + 営業利益 */}
                                    {hasBreakdown && (
                                        <div className="flex flex-col" style={{width: '50%'}}>
                                            {/* 固定費 */}
                                            <div className="flex flex-col items-center justify-center"
                                                 onMouseMove={(e) => showTooltip(e, '固定費', formatNumber(fixedCost), '対売上比', fcRate + '%', '#d9d9d9', true)}
                                                 onMouseLeave={hideTooltip}
                                                 style={{height: Math.max(fcInMpRatio, 0) + '%', backgroundColor: '#d9d9d9', minHeight: compact ? '28px' : '38px', cursor: 'default'}}>
                                                <span className={`font-bold text-gray-700 ${sz}`}>固定費</span>
                                                <span className={`font-bold text-gray-700 ${szVal}`}>{formatNumber(fixedCost)}</span>
                                            </div>
                                            {/* 営業利益 */}
                                            <div className="flex flex-col items-center justify-center"
                                                 onMouseMove={(e) => showTooltip(e, '営業利益', formatNumber(operatingProfit), '対売上比', opRate + '%', isOpNegative ? '#DC2626' : '#5ce1e6', !isOpNegative)}
                                                 onMouseLeave={hideTooltip}
                                                 style={{height: Math.max(Math.abs(opInMpRatio), 0) + '%', backgroundColor: isOpNegative ? '#DC2626' : '#5ce1e6', minHeight: compact ? '28px' : '38px', cursor: 'default'}}>
                                                <span className={`font-bold ${isOpNegative ? 'text-white' : 'text-gray-700'} ${sz}`}>営業利益</span>
                                                <span className={`font-bold ${isOpNegative ? 'text-white' : 'text-gray-700'} ${szVal}`}>{formatNumber(operatingProfit)}</span>
                                                <span className={`${isOpNegative ? 'text-white/80' : 'text-gray-600'} ${szVal}`}>{opRate}%</span>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                        {/* f/m値・ランク */}
                        <div className={`flex items-center justify-center gap-3 mt-2 ${sz}`}>
                            {hasBreakdown && (
                                <>
                                    <span className="text-gray-500">f/m: <span className="font-bold text-gray-800">{fmValue !== null ? fmValue.toFixed(1) + '%' : '-'}</span></span>
                                    <span className={`font-bold px-1.5 py-0.5 rounded ${fmRank.color} ${fmRank.bg} ${sz}`}>{fmRank.label}</span>
                                </>
                            )}
                        </div>
                        {/* ツールチップ（overflow-hiddenの外に配置） */}
                        {tooltip && (
                            <div className="absolute z-50 pointer-events-none text-xs rounded-lg px-3 py-2.5 shadow-lg border border-white/30"
                                 style={{
                                     left: Math.min(tooltip.x + 14, (wrapperRef.current?.offsetWidth || 300) - 170),
                                     top: Math.min(tooltip.y + 14, height - 10),
                                     whiteSpace: 'nowrap',
                                     backgroundColor: tooltip.bgColor,
                                     color: tooltip.textDark ? '#1f2937' : '#ffffff'
                                 }}>
                                <p className="font-bold text-sm mb-1">{tooltip.name}</p>
                                <p>金額: <span className="font-mono font-bold">{tooltip.amount}</span></p>
                                <p>{tooltip.rateLabel}: <span className="font-mono font-bold">{tooltip.rateValue}</span></p>
                            </div>
                        )}
                    </div>
                );
            };

            // STRACコンテンツ
            const STRACContent = () => {
                const sortedData = [...filteredData].sort((a, b) => new Date(a['月度']) - new Date(b['月度']));

                const totalSales = kpi.sales.act;
                const totalProfit = kpi.profit.act;

                // 固定費・営業利益の累計（月次データから集計）
                const sumKey = (key) => filteredData.reduce((acc, cur) => acc + parseValue(cur[key]), 0);
                const totalFixedCost = sumKey('固定費');
                const totalOpProfit = sumKey('営業利益');

                // 各種比率
                const actualMpRate = totalSales > 0 ? (totalProfit / totalSales * 100).toFixed(1) : '-';
                const actualVcRate = totalSales > 0 ? (100 - parseFloat(actualMpRate)).toFixed(1) : '-';
                const actualOpRate = totalSales > 0 ? (totalOpProfit / totalSales * 100).toFixed(1) : '-';

                // f/m値・ランク
                const fmValue = totalProfit > 0 ? (totalFixedCost / totalProfit * 100) : null;
                const getFmRank = (fm) => {
                    if (fm === null) return { label: '-', color: 'text-gray-400', bg: 'bg-gray-100' };
                    if (fm <= 59) return { label: 'S', color: 'text-blue-700', bg: 'bg-blue-100' };
                    if (fm <= 79) return { label: 'A', color: 'text-green-700', bg: 'bg-green-100' };
                    if (fm <= 89) return { label: 'B', color: 'text-yellow-700', bg: 'bg-yellow-100' };
                    if (fm <= 99) return { label: 'C', color: 'text-orange-700', bg: 'bg-orange-100' };
                    if (fm <= 199) return { label: 'D', color: 'text-red-700', bg: 'bg-red-100' };
                    return { label: 'DD', color: 'text-red-800', bg: 'bg-red-200' };
                };
                const fmRank = getFmRank(fmValue);

                return (
                    <>
                        <div className="mb-8">
                            <div className="flex items-center justify-between mb-6">
                                <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                                    <span className="w-1.5 h-6 bg-blue-900 inline-block"></span>
                                    <span className="text-blue-900">{selectedDept}</span>
                                    <span className="text-sm font-normal text-gray-500 ml-2">STRAC図 - {selectedYear}年度</span>
                                </h2>
                            </div>

                            {/* サマリー指標 */}
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3 mb-8">
                                <div className="bg-white border border-gray-200 p-3 rounded">
                                    <span className="text-[10px] text-gray-400 uppercase font-bold">変動費率</span>
                                    <p className="text-lg font-bold text-gray-900 mt-1">{actualVcRate}<span className="text-xs text-gray-400">%</span></p>
                                </div>
                                <div className="bg-white border border-gray-200 p-3 rounded">
                                    <span className="text-[10px] text-gray-400 uppercase font-bold">限界利益率</span>
                                    <p className="text-lg font-bold text-gray-900 mt-1">{actualMpRate}<span className="text-xs text-gray-400">%</span></p>
                                </div>
                                <div className="bg-white border border-gray-200 p-3 rounded">
                                    <span className="text-[10px] text-gray-400 uppercase font-bold">固定費</span>
                                    <p className="text-lg font-bold text-gray-900 mt-1">{formatNumber(totalFixedCost)}</p>
                                </div>
                                <div className="bg-white border border-gray-200 p-3 rounded">
                                    <span className="text-[10px] text-gray-400 uppercase font-bold">営業利益</span>
                                    <p className={`text-lg font-bold mt-1 ${totalOpProfit >= 0 ? 'text-gray-900' : 'text-red-600'}`}>{formatNumber(totalOpProfit)}</p>
                                </div>
                                <div className="bg-white border border-gray-200 p-3 rounded">
                                    <span className="text-[10px] text-gray-400 uppercase font-bold">営業利益率</span>
                                    <p className={`text-lg font-bold mt-1 ${parseFloat(actualOpRate) >= 0 ? 'text-gray-900' : 'text-red-600'}`}>{actualOpRate}<span className="text-xs text-gray-400">%</span></p>
                                </div>
                                <div className="bg-white border border-gray-200 p-3 rounded">
                                    <span className="text-[10px] text-gray-400 uppercase font-bold">f/m値</span>
                                    <div className="flex items-baseline gap-2 mt-1">
                                        <p className="text-lg font-bold text-gray-900">{fmValue !== null ? fmValue.toFixed(1) : '-'}<span className="text-xs text-gray-400">%</span></p>
                                        <span className={`font-bold text-sm px-2 py-0.5 rounded ${fmRank.color} ${fmRank.bg}`}>{fmRank.label}</span>
                                    </div>
                                </div>
                            </div>

                            {/* 累計 STRAC図 */}
                            <h3 className="font-bold text-gray-800 mb-4 text-sm border-l-4 border-gray-300 pl-3">累計 STRAC図</h3>
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-10 page-break">
                                <div className="bg-white border border-gray-200 p-5">
                                    <div className="flex items-center gap-2 mb-4 pb-2 border-b border-gray-100">
                                        <h4 className="font-bold text-gray-800 text-sm">累計実績</h4>
                                        <span className="text-xs text-gray-400 ml-auto">{sortedData.length}ヶ月</span>
                                    </div>
                                    <STRACDiagram sales={totalSales} marginalProfit={totalProfit} fixedCost={totalFixedCost} operatingProfit={totalOpProfit} height={300} />
                                </div>
                                <div className="bg-white border border-gray-200 p-5 flex flex-col justify-center">
                                    <h4 className="font-bold text-gray-800 text-sm mb-4">f/m値 ランク凡例</h4>
                                    <p className="text-xs text-gray-500 mb-3">f/m値 = 固定費 ÷ 限界利益 × 100</p>
                                    <div className="space-y-2">
                                        {[
                                            { rank: 'S', range: '59%以下', desc: '超優良企業', color: 'text-blue-700', bg: 'bg-blue-100' },
                                            { rank: 'A', range: '60%〜79%', desc: '優良企業', color: 'text-green-700', bg: 'bg-green-100' },
                                            { rank: 'B', range: '80%〜89%', desc: '普通企業', color: 'text-yellow-700', bg: 'bg-yellow-100' },
                                            { rank: 'C', range: '90%〜99%', desc: '危険水域', color: 'text-orange-700', bg: 'bg-orange-100' },
                                            { rank: 'D', range: '100%〜199%', desc: '赤字企業', color: 'text-red-700', bg: 'bg-red-100' },
                                            { rank: 'DD', range: '200%以上', desc: '倒産路線', color: 'text-red-800', bg: 'bg-red-200' }
                                        ].map((item) => (
                                            <div key={item.rank} className={`flex items-center gap-3 px-3 py-2 rounded ${fmRank.label === item.rank ? 'ring-2 ring-gray-400 bg-gray-50' : ''}`}>
                                                <span className={`font-bold text-sm w-8 text-center px-1.5 py-0.5 rounded ${item.color} ${item.bg}`}>{item.rank}</span>
                                                <span className="text-xs text-gray-500 w-24">{item.range}</span>
                                                <span className="text-xs font-medium text-gray-700">{item.desc}</span>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="mt-4 pt-3 border-t border-gray-100">
                                        <div className="flex items-center gap-2">
                                            <span className="text-xs text-gray-500">現在のf/m値:</span>
                                            <span className="text-lg font-bold text-gray-800">{fmValue !== null ? fmValue.toFixed(1) + '%' : '-'}</span>
                                            <span className={`font-bold text-sm px-2 py-0.5 rounded ${fmRank.color} ${fmRank.bg}`}>{fmRank.label}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* 月別STRAC図 */}
                            <h3 className="font-bold text-gray-800 mb-4 text-sm border-l-4 border-gray-300 pl-3">月別 STRAC図</h3>
                            <div className="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 mb-10 page-break">
                                {sortedData.map((row, idx) => {
                                    const date = new Date(row['月度']);
                                    const monthLabel = `${date.getMonth() + 1}月`;
                                    const s = parseValue(row['売上']);
                                    const mp = parseValue(row['限界利益']);
                                    const fc = parseValue(row['固定費']);
                                    const op = parseValue(row['営業利益']);
                                    return (
                                        <div key={idx} className="bg-white border border-gray-200 p-3">
                                            <STRACDiagram sales={s} marginalProfit={mp} fixedCost={fc} operatingProfit={op} label={monthLabel} height={250} compact={true} />
                                        </div>
                                    );
                                })}
                            </div>

                            {/* 年度別STRAC比較 */}
                            {filteredYearlyData.length > 0 && (
                                <div className="page-break">
                                    <h3 className="font-bold text-gray-800 mb-4 text-sm border-l-4 border-gray-300 pl-3">年度別 STRAC図比較</h3>
                                    <div className="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                                        {[...filteredYearlyData].sort((a, b) => parseValue(a['年度']) - parseValue(b['年度'])).map((row, idx) => {
                                            const s = parseValue(row['売上']);
                                            const mp = parseValue(row['限界利益']);
                                            const fc = parseValue(row['固定費']);
                                            const op = parseValue(row['営業利益']);

                                                : 'bg-gray-100 text-gray-800 border border-gray-200'
                                        }`}>
                                            {msg.role === 'user' ? (
                                                <div className="whitespace-pre-wrap break-words leading-relaxed">{msg.text}</div>
                                            ) : (
                                                <div className="chat-markdown break-words leading-relaxed" dangerouslySetInnerHTML={{ __html: renderMarkdown(msg.text) }} />
                                            )}
                                        </div>
                                    </div>
                                ))}

                                {chatLoading && (
                                    <div className="flex justify-start">
                                        <div className="flex items-center gap-2">
                                            <div className="bg-gray-100 border border-gray-200 px-4 py-3 rounded-lg">
                                                <div className="flex items-center gap-1">
                                                    <div className="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style={{animationDelay: '0ms'}}></div>
                                                    <div className="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style={{animationDelay: '150ms'}}></div>
                                                    <div className="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style={{animationDelay: '300ms'}}></div>
                                                </div>
                                            </div>
                                            <button
                                                onClick={cancelChat}
                                                className="flex-shrink-0 px-2.5 py-1.5 text-xs font-medium text-gray-500 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 hover:text-red-500 hover:border-red-300 transition-colors"
                                            >
                                                中断
                                            </button>
                                        </div>
                                    </div>
                                )}
                                <div ref={chatEndRef} />
                            </div>

                            {/* Chat Input */}
                            <div className="flex-shrink-0 border-t border-gray-200 p-3">
                                <div className="flex items-end gap-2">
                                    <textarea
                                        value={chatInput}
                                        onChange={(e) => setChatInput(e.target.value)}
                                        onKeyDown={handleChatKeyDown}
                                        placeholder="データについて質問..."
                                        rows={1}
                                        className="flex-1 resize-none border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-gray-500 focus:border-gray-500 max-h-[100px] overflow-y-auto"
                                        style={{minHeight: '38px'}}
                                    />
                                    <button
                                        onClick={sendChat}
                                        disabled={!chatInput.trim() || chatLoading}
                                        className={`flex-shrink-0 w-9 h-9 flex items-center justify-center rounded-lg transition-colors ${
                                            chatInput.trim() && !chatLoading
                                                ? 'bg-gray-900 text-white hover:bg-gray-700'
                                                : 'bg-gray-200 text-gray-400 cursor-not-allowed'
                                        }`}
                                    >
                                        <SendIcon size={16} />
                                    </button>
                                </div>
                                <p className="text-[10px] text-gray-400 mt-1.5 text-center">Gemini AI による分析 - Ctrl+Enter で送信</p>
                            </div>
                        </aside>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
